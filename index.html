<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ॐ श्री गणेशाय नमः</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit:ital@0;1&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f5c842;
      --gold-dim: #c9922a;
      --saffron: #ff9933;
      --crimson: #8b0000;
      --deep: #0d0005;
      --maroon: #1a0008;
      --flame-core: #fff5a0;
      --flame-mid: #ffaa00;
      --flame-outer: #ff4500;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--deep);
      overflow: hidden;
      font-family: 'Tiro Devanagari Sanskrit', serif;
    }

    /* ── Mandala background ── */
    .bg-mandala {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 0;
    }
    .bg-mandala svg {
      width: min(130vw, 130vh);
      height: min(130vw, 130vh);
      opacity: 0.07;
      animation: spin-slow 120s linear infinite;
    }

    /* ── Radial vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse 60% 60% at 50% 50%,
        transparent 30%,
        rgba(13,0,5,0.55) 70%,
        rgba(13,0,5,0.92) 100%);
      pointer-events: none;
    }

    /* ── Particles ── */
    #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
      animation: float-up linear infinite;
      opacity: 0;
    }

    /* ── Scene ── */
    .scene {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }

    /* ── Aarti orbit wrapper ── */
    .aarti-ring {
      position: relative;
      width: 380px; height: 380px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Om SVG ── */
    .om-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      z-index: 3;
    }
    .om-glow {
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(245,200,66,0.35) 0%,
        rgba(255,153,51,0.18) 40%,
        transparent 70%);
      animation: pulse-halo 2.8s ease-in-out infinite;
    }
    .om-svg {
      position: relative; z-index: 2;
      filter: drop-shadow(0 0 18px #f5c842cc) drop-shadow(0 0 40px #ff993366);
      animation: pulse-om 2.8s ease-in-out infinite;
    }

    /* ── Orbit track ── */
    .orbit-track {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(245,200,66,0.12);
      animation: spin-orbit 8s linear infinite;
    }

    /* ── Diya ── */
    .diya-container {
      position: absolute;
      width: 380px; height: 380px;
      top: 0; left: 0;
      animation: spin-orbit 8s linear infinite;
    }
    .diya {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.6rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px #ffaa00cc) drop-shadow(0 0 20px #ff450099);
      animation: counter-spin 8s linear infinite, flicker 0.18s ease-in-out infinite alternate;
    }
    .diya-halo {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,200,50,0.5) 0%,
        rgba(255,100,0,0.25) 45%,
        transparent 70%);
      animation: counter-spin 8s linear infinite, breathe-halo 2s ease-in-out infinite;
    }

    /* ── Second smaller diya (counter-orbit for richness) ── */
    .diya-container-2 {
      position: absolute;
      width: 300px; height: 300px;
      top: 40px; left: 40px;
      animation: spin-orbit-2 13s linear infinite reverse;
    }
    .diya-2 {
      position: absolute;
      top: -16px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.8rem;
      filter: drop-shadow(0 0 6px #ffaa00bb) drop-shadow(0 0 14px #ff450077);
      animation: counter-spin-2 13s linear infinite reverse, flicker 0.22s ease-in-out infinite alternate;
      opacity: 0.75;
    }

    /* ── Mantra text ── */
    .mantra {
      margin-top: 28px;
      font-family: 'Tiro Devanagari Sanskrit', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.1rem);
      color: var(--gold);
      letter-spacing: 0.06em;
      text-align: center;
      text-shadow:
        0 0 12px #f5c84288,
        0 0 30px #ff993344,
        0 0 60px #ff993322;
      animation: shimmer-text 3.5s ease-in-out infinite;
      line-height: 1.5;
    }
    .subtitle {
      margin-top: 10px;
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.55rem, 1.3vw, 0.8rem);
      color: rgba(245,200,66,0.45);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── Petal particles ── */
    .petal {
      position: fixed;
      font-size: 1rem;
      pointer-events: none;
      z-index: 5;
      animation: petal-fall linear infinite;
      opacity: 0;
    }

    /* ── Audio toggle ── */
    .audio-btn {
      position: fixed;
      bottom: 28px; right: 28px;
      z-index: 100;
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(245,200,66,0.4);
      background: rgba(26,0,8,0.85);
      backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      color: var(--gold);
      box-shadow: 0 0 14px rgba(245,200,66,0.15);
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .audio-btn:hover {
      border-color: var(--gold);
      box-shadow: 0 0 24px rgba(245,200,66,0.35);
    }
    .audio-btn.muted { opacity: 0.45; }

    /* ── Keyframes ── */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spin-orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spin-orbit-2 {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes counter-spin {
      from { transform: translateX(-50%) rotate(0deg); }
      to   { transform: translateX(-50%) rotate(-360deg); }
    }
    @keyframes counter-spin-2 {
      from { transform: translateX(-50%) rotate(0deg); }
      to   { transform: translateX(-50%) rotate(360deg); }
    }
    @keyframes pulse-om {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }
    @keyframes pulse-halo {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.18); opacity: 0.6; }
    }
    @keyframes flicker {
      from { filter: drop-shadow(0 0 6px #ffcc00cc) drop-shadow(0 0 16px #ff4500aa); opacity: 1; }
      to   { filter: drop-shadow(0 0 12px #ffdd44ff) drop-shadow(0 0 28px #ff6600cc); opacity: 0.88; }
    }
    @keyframes breathe-halo {
      0%, 100% { transform: translateX(-50%) scale(1);    opacity: 0.8; }
      50%       { transform: translateX(-50%) scale(1.35); opacity: 0.4; }
    }
    @keyframes shimmer-text {
      0%, 100% { text-shadow: 0 0 12px #f5c84299, 0 0 30px #ff993355, 0 0 60px #ff993322; }
      50%       { text-shadow: 0 0 20px #f5c842cc, 0 0 50px #ff993388, 0 0 90px #ff993344; }
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }
    @keyframes petal-fall {
      0%   { transform: translateY(-20px) rotate(0deg);    opacity: 0; }
      10%  { opacity: 0.85; }
      100% { transform: translateY(105vh) rotate(720deg);  opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Mandala BG -->
<div class="bg-mandala">
  <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#f5c842" stroke-width="0.8" transform="translate(400,400)">
      <!-- concentric rings -->
      <circle r="60"/><circle r="100"/><circle r="140"/><circle r="180"/>
      <circle r="230"/><circle r="280"/><circle r="330"/><circle r="370"/>
      <!-- 16-petal outer ring -->
      <g id="petal-group">
        <ellipse rx="18" ry="55" transform="translate(0,-305)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(22.5)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(45)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(67.5)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(90)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(112.5)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(135)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(157.5)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(180)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(202.5)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(225)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(247.5)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(270)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(292.5)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(315)"/>
        <ellipse rx="18" ry="55" transform="translate(0,-305) rotate(337.5)"/>
      </g>
      <!-- spokes -->
      <g stroke-width="0.4">
        <line x1="0" y1="-60" x2="0" y2="-370"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(22.5)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(45)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(67.5)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(90)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(112.5)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(135)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(157.5)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(180)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(202.5)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(225)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(247.5)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(270)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(292.5)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(315)"/>
        <line x1="0" y1="-60" x2="0" y2="-370" transform="rotate(337.5)"/>
      </g>
      <!-- inner lotus -->
      <g>
        <ellipse rx="10" ry="30" transform="translate(0,-85)"/>
        <ellipse rx="10" ry="30" transform="translate(0,-85) rotate(45)"/>
        <ellipse rx="10" ry="30" transform="translate(0,-85) rotate(90)"/>
        <ellipse rx="10" ry="30" transform="translate(0,-85) rotate(135)"/>
        <ellipse rx="10" ry="30" transform="translate(0,-85) rotate(180)"/>
        <ellipse rx="10" ry="30" transform="translate(0,-85) rotate(225)"/>
        <ellipse rx="10" ry="30" transform="translate(0,-85) rotate(270)"/>
        <ellipse rx="10" ry="30" transform="translate(0,-85) rotate(315)"/>
      </g>
    </g>
  </svg>
</div>

<div class="vignette"></div>
<canvas id="particles"></canvas>

<!-- Main scene -->
<div class="scene">
  <div class="aarti-ring">

    <!-- Orbit track decoration -->
    <div class="orbit-track"></div>

    <!-- Primary diya orbiting -->
    <div class="diya-container">
      <div class="diya-halo"></div>
      <div class="diya">🪔</div>
    </div>

    <!-- Secondary diya (inner orbit, opposite direction) -->
    <div class="diya-container-2">
      <div class="diya-2">🪔</div>
    </div>

    <!-- Om Ganesh centerpiece -->
    <div class="om-wrap">
      <div class="om-glow"></div>
      <svg class="om-svg" width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="omGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#fff8c0"/>
            <stop offset="40%"  stop-color="#f5c842"/>
            <stop offset="80%"  stop-color="#c9922a"/>
            <stop offset="100%" stop-color="#8b5e00"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Lotus base petals -->
        <g transform="translate(100,100)" fill="none" stroke="#c9922a" stroke-width="1.2" opacity="0.55">
          <ellipse rx="10" ry="28" transform="translate(0,58)"/>
          <ellipse rx="10" ry="28" transform="translate(0,58) rotate(45)"/>
          <ellipse rx="10" ry="28" transform="translate(0,58) rotate(90)"/>
          <ellipse rx="10" ry="28" transform="translate(0,58) rotate(135)"/>
          <ellipse rx="10" ry="28" transform="translate(0,58) rotate(180)"/>
          <ellipse rx="10" ry="28" transform="translate(0,58) rotate(225)"/>
          <ellipse rx="10" ry="28" transform="translate(0,58) rotate(270)"/>
          <ellipse rx="10" ry="28" transform="translate(0,58) rotate(315)"/>
        </g>
        <!-- OM symbol text -->
        <text
          x="100" y="118"
          text-anchor="middle"
          font-family="'Tiro Devanagari Sanskrit', serif"
          font-size="110"
          fill="url(#omGrad)"
          filter="url(#glow)"
        >ॐ</text>
        <!-- decorative dot above -->
        <circle cx="100" cy="22" r="5" fill="#f5c842" opacity="0.7"/>
        <circle cx="100" cy="22" r="9" fill="none" stroke="#f5c842" stroke-width="0.8" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Mantra text -->
  <div class="mantra">ॐ श्री गणेशाय नमः</div>
  <div class="subtitle">Shree Ganesh Puja &nbsp;•&nbsp; Aarti</div>
</div>

<!-- Floating rose petals -->
<div id="petals"></div>

<!-- Audio -->
<audio id="mantra-audio" src="mantra.mp3" loop autoplay></audio>

<!-- Mute toggle -->
<button class="audio-btn muted" id="audio-btn" title="Toggle mantra audio">🔇</button>

<script>
  // ── Audio toggle ──
  const audio = document.getElementById('mantra-audio');
  const btn   = document.getElementById('audio-btn');
  audio.muted = true; // start muted (browser policy); user can unmute

  btn.addEventListener('click', () => {
    audio.muted = !audio.muted;
    btn.textContent = audio.muted ? '🔇' : '🔊';
    btn.classList.toggle('muted', audio.muted);
    if (!audio.muted) audio.play().catch(() => {});
  });

  // ── Floating particles (golden sparks) ──
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function spawnParticle() {
    return {
      x: Math.random() * W,
      y: H + 10,
      vx: (Math.random() - 0.5) * 0.6,
      vy: -(0.4 + Math.random() * 1.2),
      r: 1 + Math.random() * 2.5,
      life: 0,
      maxLife: 200 + Math.random() * 300,
      hue: 35 + Math.random() * 25,
    };
  }

  for (let i = 0; i < 60; i++) {
    const p = spawnParticle();
    p.y = Math.random() * H;
    p.life = Math.random() * p.maxLife;
    particles.push(p);
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life++;
      if (p.life > p.maxLife) { particles[i] = spawnParticle(); continue; }
      const alpha = Math.sin((p.life / p.maxLife) * Math.PI) * 0.7;
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.5);
      grd.addColorStop(0, `hsla(${p.hue}, 95%, 80%, ${alpha})`);
      grd.addColorStop(1, `hsla(${p.hue}, 95%, 60%, 0)`);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // ── Falling flower petals ──
  const petalContainer = document.getElementById('petals');
  const petalEmojis = ['🌸', '🌺', '🏵️', '✿'];
  function spawnPetal() {
    const el = document.createElement('span');
    el.className = 'petal';
    el.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    const dur = 8 + Math.random() * 10;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * -dur) + 's';
    el.style.fontSize = (0.7 + Math.random() * 0.8) + 'rem';
    el.style.opacity = 0;
    petalContainer.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }
  for (let i = 0; i < 18; i++) spawnPetal();
  setInterval(spawnPetal, 2200);
</script>
</body>
</html>
